name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skills
        run: |
          errors=0
          for skill in skills/*/; do
            name=$(basename "$skill")
            echo "::group::$name"

            if [ ! -f "$skill/SKILL.md" ]; then
              echo "::error::$name has no SKILL.md"
              errors=$((errors + 1))
              echo "::endgroup::"
              continue
            fi

            python skills/skill-forge/scripts/quick_validate.py "$skill" || {
              echo "::error::SKILL.md validation failed for $name"
              errors=$((errors + 1))
            }

            if [ ! -f "$skill/README.md" ]; then
              echo "::error::$name is missing README.md"
              errors=$((errors + 1))
            fi

            echo "::endgroup::"
          done

          if [ $errors -gt 0 ]; then
            echo "::error::$errors skill(s) failed"
            exit 1
          fi
          echo "All skills ok"
